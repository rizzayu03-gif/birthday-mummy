<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Mummy 💖</title>

<style>
    body {
        margin: 0;
        font-family: 'Comic Sans MS', cursive;
        background: pink;
        text-align: center;
        overflow-x: hidden;
    }

    h1 {
        color: white;
        margin-top: 100px;
        font-size: 40px;
        text-shadow: 2px 2px 5px red;
    }

    p {
        font-size: 20px;
        color: white;
    }

    .container {
        padding: 20px;
    }

    .photos img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 20px;
        margin: 10px;
        border: 5px solid white;
    }

    /* Hanging Banner */
    .banner {
        position: fixed;
        top: 0;
        width: 100%;
        text-align: center;
    }

    .banner span {
        display: inline-block;
        background: white;
        color: pink;
        padding: 10px 15px;
        margin: 5px;
        font-weight: bold;
        border-radius: 10px;
        box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        position: relative;
        animation: swing 2s infinite ease-in-out alternate;
    }

    /* string */
    .banner span::before {
        content: "";
        position: absolute;
        width: 2px;
        height: 30px;
        background: white;
        top: -30px;
        left: 50%;
    }

    @keyframes swing {
        from { transform: rotate(-5deg); }
        to { transform: rotate(5deg); }
    }

    /* floating hearts */
    .heart {
        position: absolute;
        color: red;
        font-size: 20px;
        animation: float 5s infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-600px); opacity: 0; }
    }

    /* decorations */
    .decor {
        position: absolute;
        font-size: 30px;
        animation: spin 10s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

</style>
</head>

<body>

<!-- Hanging Banner -->
<div class="banner">
    <span>H</span>
    <span>A</span>
    <span>P</span>
    <span>P</span>
    <span>Y</span>
    <span>🎂</span>
    <span>B</span>
    <span>I</span>
    <span>R</span>
    <span>T</span>
    <span>H</span>
    <span>D</span>
    <span>A</span>
    <span>Y</span>
</div>

<h1>🎉 Happy Birthday Mummy 💖 🎉</h1>

<div class="container">
    <p>You are the best mom in the world 💕</p>
    <p>I love you so much! 💖</p>

    <div class="photos">
        <!-- REPLACE WITH YOUR PHOTOS -->
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
    </div>
</div>

<!-- Hearts -->
<script>
for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = Math.random() * 100 + "vh";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    document.body.appendChild(heart);
}
</script>

<!-- Decorations -->
<div class="decor" style="top:15%; left:10%;">🎈</div>
<div class="decor" style="top:25%; right:10%;">🎉</div>
<div class="decor" style="bottom:10%; left:20%;">🎂</div>
<div class="decor" style="bottom:20%; right:20%;">🎁</div>

</body>
</html>
